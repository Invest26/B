<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Panel — WealthWise Advisory</title>
<meta name="robots" content="noindex,nofollow">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--navy:#0a1628;--gold:#c9a84c;--grey:#f4f6fa;--muted:#6b7a90;--danger:#e74c3c;--success:#27ae60}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--grey);color:#2c3e50;min-height:100vh}

/* LOGIN */
#login{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,var(--navy),#102040)}
.login-box{background:#fff;border-radius:16px;padding:2.5rem;width:360px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{font-size:1.8rem;font-weight:700;color:var(--navy);margin-bottom:.25rem}.login-logo span{color:var(--gold)}
.login-sub{color:var(--muted);font-size:.85rem;margin-bottom:2rem}
.login-box input{width:100%;border:2px solid #e8edf4;border-radius:8px;padding:.85rem 1rem;font-size:.9rem;font-family:'DM Sans',sans-serif;margin-bottom:1rem;transition:.2s}
.login-box input:focus{outline:none;border-color:var(--gold)}
.btn-login{width:100%;background:linear-gradient(135deg,var(--gold),#f0c060);color:var(--navy);border:none;padding:.9rem;border-radius:8px;font-size:.95rem;font-weight:700;cursor:pointer;transition:.2s;font-family:'DM Sans',sans-serif}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(201,168,76,.4)}
.login-err{color:var(--danger);font-size:.85rem;margin-top:.5rem;min-height:1.2rem}

/* DASHBOARD */
#dashboard{display:none;padding:2rem;max-width:1200px;margin:0 auto}
.dash-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;flex-wrap:gap}
.dash-header h1{font-size:1.4rem;color:var(--navy)}
.dash-header-right{display:flex;gap:.75rem;align-items:center}
.btn-sm{background:var(--navy);color:#fff;border:none;padding:.5rem 1rem;border-radius:6px;font-size:.82rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:.2s}
.btn-sm:hover{background:#1a3560}
.btn-danger{background:var(--danger)!important}
.btn-export{background:var(--success)!important}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:2rem}
.stat{background:#fff;border-radius:12px;padding:1.25rem;box-shadow:0 2px 12px rgba(0,0,0,.06);border-left:4px solid var(--gold)}
.stat strong{display:block;font-size:2rem;color:var(--navy);font-weight:700}
.stat span{font-size:.82rem;color:var(--muted)}

/* FILTERS */
.filters{display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:1.5rem;align-items:center}
.filters input,.filters select{border:2px solid #e8edf4;border-radius:7px;padding:.5rem .9rem;font-size:.87rem;font-family:'DM Sans',sans-serif;transition:.2s}
.filters input:focus,.filters select:focus{outline:none;border-color:var(--gold)}

/* TABLE */
.table-wrap{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.06);overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{background:var(--navy);color:#fff;padding:.85rem 1rem;text-align:left;font-size:.82rem;font-weight:600;white-space:nowrap}
tbody tr{border-bottom:1px solid #f0f3f8;transition:.15s}
tbody tr:hover{background:#fafbff}
tbody td{padding:.8rem 1rem;font-size:.85rem;color:#3a4555;vertical-align:middle}
.badge{display:inline-block;padding:.2rem .6rem;border-radius:50px;font-size:.72rem;font-weight:600}
.badge-demat{background:#e8f4fd;color:#1a6ea8}
.badge-sip{background:#e8f8ef;color:#1a7a3c}
.badge-lic{background:#fef9e7;color:#9a7d0a}
.badge-retire{background:#f4e8fd;color:#7b1fa2}
.badge-review{background:#fde8f0;color:#a81a4e}
.badge-other{background:var(--grey);color:var(--muted)}
.badge-hero{background:#fff3e0;color:#e65100}
.badge-form{background:#e8edf4;color:var(--navy)}
.del-btn{background:none;border:none;color:#ccc;cursor:pointer;font-size:1rem;padding:.2rem .4rem;border-radius:4px;transition:.2s}
.del-btn:hover{color:var(--danger);background:#fde8e8}
.no-leads{text-align:center;padding:3rem;color:var(--muted)}
.back-link{color:var(--gold);font-size:.85rem;text-decoration:none}
.back-link:hover{text-decoration:underline}
#clearConfirm{display:none;background:#fff;border:2px solid var(--danger);border-radius:8px;padding:1rem;text-align:center;margin-top:1rem;font-size:.9rem}
#clearConfirm button{margin:.5rem .25rem}
@media(max-width:600px){#dashboard{padding:1rem}.stats{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <div class="login-logo">Wealth<span>Wise</span></div>
    <div class="login-sub">Admin Panel · Secure Access</div>
    <input type="password" id="passInput" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')tryLogin()">
    <button class="btn-login" onclick="tryLogin()">Login →</button>
    <div class="login-err" id="loginErr"></div>
    <a href="index.html" style="display:block;margin-top:1.5rem;font-size:.82rem;color:var(--muted)">← Back to Website</a>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="dash-header">
    <div>
      <h1>📊 Lead Management Dashboard</h1>
      <a href="index.html" class="back-link">← Back to Website</a>
    </div>
    <div class="dash-header-right">
      <button class="btn-sm btn-export" onclick="exportCSV()">⬇ Export CSV</button>
      <button class="btn-sm btn-danger" onclick="document.getElementById('clearConfirm').style.display='block'">🗑 Clear All</button>
      <button class="btn-sm" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><strong id="sTot">0</strong><span>Total Leads</span></div>
    <div class="stat"><strong id="sToday">0</strong><span>Today</span></div>
    <div class="stat"><strong id="sSIP">0</strong><span>SIP/MF Interest</span></div>
    <div class="stat"><strong id="sDemat">0</strong><span>Demat Interest</span></div>
    <div class="stat"><strong id="sLIC">0</strong><span>LIC Interest</span></div>
  </div>

  <div class="filters">
    <input type="text" id="searchInput" placeholder="🔍 Search name, phone, email..." oninput="renderTable()">
    <select id="filterInterest" onchange="renderTable()">
      <option value="">All Interests</option>
      <option>Open Demat Account</option>
      <option>Start SIP / Mutual Fund</option>
      <option>Buy LIC Insurance</option>
      <option>Retirement Planning</option>
      <option>Free Portfolio Review</option>
      <option>General Query</option>
    </select>
    <select id="filterSource" onchange="renderTable()">
      <option value="">All Sources</option>
      <option>Hero Quick Enquiry</option>
      <option>Contact Form</option>
    </select>
  </div>

  <div class="table-wrap">
    <table>
      <thead><tr>
        <th>#</th><th>Name</th><th>Phone</th><th>Email</th>
        <th>Interest</th><th>Message</th><th>Source</th><th>Date</th><th></th>
      </tr></thead>
      <tbody id="leadsTable"></tbody>
    </table>
  </div>

  <div id="clearConfirm">
    ⚠️ Are you sure you want to delete ALL leads? This cannot be undone.
    <br>
    <button class="btn-sm btn-danger" onclick="clearAll()">Yes, Delete All</button>
    <button class="btn-sm" onclick="document.getElementById('clearConfirm').style.display='none'">Cancel</button>
  </div>
</div>

<script>
// Password is stored as SHA-256 hash only — plain text is never in this file.

const PASS_HASH = 'edf204f747a20c78fda6a384b95df5c4ab22f61cef6f34ac60b04b30ab1e4663';
const KEY = 'ww_leads';
let authed = false;

async function sha256(str){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// Run this in browser console to get hash of a new password:
// sha256('YourNewPassword').then(h => console.log(h))
async function tryLogin(){
  const p = document.getElementById('passInput').value;
  const hash = await sha256(p);
  if(hash === PASS_HASH){
    authed = true;
    document.getElementById('login').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    renderDashboard();
  } else {
    document.getElementById('loginErr').textContent = '❌ Incorrect password. Please try again.';
    document.getElementById('passInput').value = '';
  }
}

function logout(){ location.reload(); }

function getLeads(){ try{ return JSON.parse(localStorage.getItem(KEY)||'[]') }catch{ return [] } }

function renderDashboard(){
  const leads = getLeads();
  const today = new Date().toLocaleDateString('en-IN');
  document.getElementById('sTot').textContent = leads.length;
  document.getElementById('sToday').textContent = leads.filter(l=>l.date&&l.date.startsWith(today.split('/')[0])).length;
  document.getElementById('sSIP').textContent = leads.filter(l=>(l.interest||'').includes('SIP')).length;
  document.getElementById('sDemat').textContent = leads.filter(l=>(l.interest||'').includes('Demat')).length;
  document.getElementById('sLIC').textContent = leads.filter(l=>(l.interest||'').includes('LIC')).length;
  renderTable();
}

function renderTable(){
  if(!authed) return;
  let leads = getLeads();
  const q = document.getElementById('searchInput').value.toLowerCase();
  const fi = document.getElementById('filterInterest').value;
  const fs = document.getElementById('filterSource').value;
  if(q) leads = leads.filter(l=>(l.name+l.phone+l.email).toLowerCase().includes(q));
  if(fi) leads = leads.filter(l=>l.interest===fi);
  if(fs) leads = leads.filter(l=>l.source===fs);

  const tb = document.getElementById('leadsTable');
  if(!leads.length){ tb.innerHTML='<tr><td colspan="9" class="no-leads">📭 No leads found.</td></tr>'; return; }

  tb.innerHTML = leads.map((l,i)=>`
    <tr>
      <td>${i+1}</td>
      <td><strong>${esc(l.name||'—')}</strong></td>
      <td><a href="tel:${esc(l.phone)}">${esc(l.phone||'—')}</a></td>
      <td>${l.email?`<a href="mailto:${esc(l.email)}">${esc(l.email)}</a>`:'—'}</td>
      <td><span class="badge ${getBadge(l.interest)}">${esc(l.interest||'General')}</span></td>
      <td style="max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${esc(l.message)}">${esc(l.message||'—')}</td>
      <td><span class="badge ${l.source==='Hero Quick Enquiry'?'badge-hero':'badge-form'}">${esc(l.source||'—')}</span></td>
      <td style="white-space:nowrap">${esc(l.date||'—')}</td>
      <td><button class="del-btn" onclick="deleteLead(${l.id})" title="Delete">✕</button></td>
    </tr>
  `).join('');
}

function getBadge(i=''){
  if(i.includes('Demat')) return 'badge-demat';
  if(i.includes('SIP')||i.includes('Mutual')) return 'badge-sip';
  if(i.includes('LIC')) return 'badge-lic';
  if(i.includes('Retire')) return 'badge-retire';
  if(i.includes('Portfolio')) return 'badge-review';
  return 'badge-other';
}

function esc(s=''){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function deleteLead(id){
  if(!confirm('Delete this lead?')) return;
  const leads = getLeads().filter(l=>l.id!==id);
  localStorage.setItem(KEY, JSON.stringify(leads));
  renderDashboard();
}

function clearAll(){
  localStorage.removeItem(KEY);
  document.getElementById('clearConfirm').style.display='none';
  renderDashboard();
}

function exportCSV(){
  const leads = getLeads();
  const headers = ['#','Name','Phone','Email','Interest','Message','Source','Date'];
  const rows = leads.map((l,i)=>[i+1,l.name,l.phone,l.email,l.interest,l.message,l.source,l.date].map(v=>`"${(v||'').toString().replace(/"/g,'""')}"`));
  const csv = [headers,...rows].map(r=>r.join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'wealthwise-leads-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

document.getElementById('passInput').focus();
</script>
</body>
</html>
